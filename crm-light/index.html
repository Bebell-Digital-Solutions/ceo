      const [count, setCount] = useState(0);

      useEffect(() => {
        let start = 0;
        const end = parseInt(value, 10) || 0;
        if (start === end) { setCount(end); return; }
        
        const duration = 1000;
        const incrementTime = Math.max(10, Math.abs(Math.floor(duration / (end - start))));
        const timer = setInterval(() => {
          start += 1;
          setCount(start);
          if (start === end) clearInterval(timer);
        }, incrementTime);
        return () => clearInterval(timer);

// Fully supports Custom Fields, Subtasks, Comments & Master Schema properties
function doGet(e) {
  const action = e.parameter.action;
  let result = { status: "success", message: "API is running" };
  
  try {
     if (action === "getKanbanTasks") result = getRecords("Kanban");
  } catch(err) {}
  
  return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);

function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    const action = data.action;
    
    // Gets active sheet
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    let sheet = ss.getSheetByName("Kanban");
    
    // Extended Schema defined in Settings matching future Master DB Tab
    const headers = ["ID", "Name", "Description", "Status", "Deadline", "Color", "Tags", "Contact ID", "Org ID", "Quote ID", "Invoice ID", "Receipt ID", "Banner URL", "Created At", "Updated At", "Custom Fields", "Subtasks", "Comments"];
    
    if (!sheet) {
      sheet = ss.insertSheet("Kanban");
      sheet.appendRow(headers);
    } else if (sheet.getLastRow() === 0) {
      sheet.appendRow(headers);
    }

    if (action === "saveKanbanTask") {
       const payload = data.payload;
       
       // Map object payload strictly to headers
       const rowData = headers.map(header => {
           let val = payload[header];
           if (typeof val === 'object') return JSON.stringify(val);
           return val || "";
       });

       const records = sheet.getDataRange().getValues();
       let updated = false;
       for (let i = 1; i < records.length; i++) {
         if (records[i][0] === payload["ID"]) {
           sheet.getRange(i + 1, 1, 1, rowData.length).setValues([rowData]);
           updated = true;
           break;
         }
       }
       if (!updated) sheet.appendRow(rowData);
       
       return ContentService.createTextOutput(JSON.stringify({ status: "success", action: updated ? "updated" : "created" })).setMimeType(ContentService.MimeType.JSON);
       
    } else if (action === "deleteRecord") {
       const id = data.id;
       const records = sheet.getDataRange().getValues();
       for (let i = 1; i < records.length; i++) {
         if (records[i][0] === id) {
            sheet.deleteRow(i + 1);
            return ContentService.createTextOutput(JSON.stringify({ status: "success", message: "Deleted" })).setMimeType(ContentService.MimeType.JSON);
         }
       }
    }
    
    return ContentService.createTextOutput(JSON.stringify({ status: "success", message: "Processed" })).setMimeType(ContentService.MimeType.JSON);
      
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ status: "error", message: error.toString() })).setMimeType(ContentService.MimeType.JSON);
  }
}

// Function to fetch standard records
function getRecords(sheetName) {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(sheetName);
  if (!sheet) return [];
  const data = sheet.getDataRange().getValues();
  if (data.length <= 1) return []; 
  const headers = data[0];
  const records = [];
  for (let i = 1; i < data.length; i++) {
    let row = data[i];
    let obj = {};
    for (let j = 0; j < headers.length; j++) {
      obj[headers[j]] = row[j];
    }
    records.push(obj);
  }
  return records;
}

// Essential for CORS
function doOptions(e) {

}`;

                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div>
                      <label className="block text-xs font-medium text-gray-700 mb-1">{t('priority', lang)} *</label>
                      <select required name="priority" value={formData.customFields.priority} onChange={handleCustomFieldChange} className="w-full px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none">
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-gray-700 mb-1">{t('estHours', lang)}</label>
                      <input required type="number" min="0" name="estimatedHours" value={formData.customFields.estimatedHours} onChange={handleCustomFieldChange} className="w-full px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-gray-700 mb-1">{t('budget', lang)}</label>
                      <div className="relative">
                        <span className="absolute left-2.5 top-1.5 text-gray-400 text-sm">$</span>
                        <input type="number" min="0" name="clientBudget" value={formData.customFields.clientBudget} onChange={handleCustomFieldChange} className="w-full pl-6 pr-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-gray-700 mb-1">{t('risk', lang)}</label>
                      <select name="riskLevel" value={formData.customFields.riskLevel} onChange={handleCustomFieldChange} className="w-full px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none">
                        <option value="1">1 - Minimal</option>
                        <option value="2">2 - Low</option>
                        <option value="3">3 - Moderate</option>
                        <option value="4">4 - High</option>
                        <option value="5">5 - Critical</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4 border-t border-gray-100">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-1.5"><IcoCheckSquare className="w-4 h-4" /> {t('subtasks', lang)}</label>
                    <div className="flex gap-2 mb-3">
                      <input type="text" value={newSubtask} onChange={e => setNewSubtask(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter') { e.preventDefault(); handleAddSubtask(); } }} className="flex-1 px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                      <button type="button" onClick={handleAddSubtask} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors">{t('addBtn', lang)}</button>
                    </div>
                    <div className="space-y-2 max-h-32 overflow-y-auto pr-2">
                      {formData.subtasks.map(st => (
                        <div key={st.id} className="flex items-center gap-3 p-2 border border-gray-100 rounded-lg bg-gray-50 group hover:border-gray-200">
                          <input type="checkbox" checked={st.completed} onChange={() => toggleSubtask(st.id)} className="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary cursor-pointer" />
                          <span className={`flex-1 text-sm ${st.completed ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{st.title}</span>
                          <button type="button" onClick={() => removeSubtask(st.id)} className="opacity-0 group-hover:opacity-100 p-1 text-gray-400 hover:text-red-500 rounded"><IcoTrash2 className="w-3.5 h-3.5" /></button>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-1.5"><IcoMessageSquare className="w-4 h-4" /> {t('comments', lang)}</label>
                    <div className="space-y-3 mb-3 max-h-32 overflow-y-auto pr-2">
                      {formData.comments.map(c => (
                        <div key={c.id} className="bg-primary/5 rounded-lg p-3 text-sm border border-primary/10">
                          <p className="text-text mb-1">{c.text}</p>
                          <span className="text-[10px] text-gray-400">{c.date}</span>
                        </div>
                      ))}
                    </div>
                    <div className="flex gap-2">
                      <textarea value={newComment} onChange={e => setNewComment(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAddComment(); } }} className="flex-1 px-3 py-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none resize-none min-h-[100px]" placeholder={t('writeComment', lang)} />
                      <button type="button" onClick={handleAddComment} className="px-4 py-2 bg-secondary/10 hover:bg-secondary/20 text-secondary text-sm font-medium rounded-lg transition-colors flex-shrink-0 self-end">{t('post', lang)}</button>
                    </div>
                  </div>
                </div>
              </form>
            </div>
            
            <div className="flex justify-end gap-3 p-6 border-t border-gray-100 bg-gray-50 flex-shrink-0">
              <button type="button" onClick={onClose} className="px-5 py-2 text-text bg-white border border-gray-200 hover:bg-gray-50 rounded-lg font-medium transition-colors">{t('cancel', lang)}</button>
              <button type="submit" form="project-form" className="px-5 py-2 text-white bg-primary hover:bg-primary/90 rounded-lg font-medium shadow-sm transition-all active:scale-95">
                {initialData ? t('saveBtn', lang) : t('createBtn', lang)}
              </button>
            </div>
          </div>
        </div>
      );
    };

    function MetricCard({ title, value, color, icon: IconComponent, iconColor }) {
      return (
        <div className={`p-4 rounded-xl border ${color} flex items-center gap-4`}>
          {IconComponent && (
            <div className="w-[50px] h-[50px] flex-shrink-0 rounded-[10px] overflow-hidden bg-metric-bg border border-metric-border shadow-sm flex items-center justify-center">
              <IconComponent className={`w-6 h-6 ${iconColor}`} />
            </div>
          )}
          <div>
            <h3 className="text-sm font-medium opacity-80 mb-0.5 leading-tight">{title}</h3>
            <div className="text-3xl font-bold leading-none mt-1">
              <AnimatedCounter value={value} />
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem('appLang') || 'en');
      const [isSyncing, setIsSyncing] = useState(false);
      const [isConnected, setIsConnected] = useState(false);

      const [stages, setStages] = useState(() => {
        const saved = localStorage.getItem('appStages');
        return saved ? JSON.parse(saved) : defaultStages;
      });

      const getStageName = (stageId) => {
        const stage = stages.find(s => s.id === stageId);
        return stage ? stage[lang] : stageId;
      };

      const toggleLanguage = () => {
        const newLang = lang === 'en' ? 'es' : 'en';
        setLang(newLang);
        localStorage.setItem('appLang', newLang);
      };

      // Backend API Integration Logic (Formatting payloads to strict columns)
      const formatPayloadForBackend = (projectData) => {
         return {
            "ID": projectData.id,
            "Name": projectData.name || "",
            "Description": projectData.description || "",
            "Status": projectData.status || "",
            "Deadline": projectData.deadline || "",
            "Color": projectData.color || "",
            "Tags": JSON.stringify(projectData.tags || []),
            "Contact ID": projectData.contactId || "",
            "Org ID": projectData.organizationId || "",
            "Quote ID": projectData.quoteId || "",
            "Invoice ID": projectData.invoiceId || "",
            "Receipt ID": projectData.receiptId || "",
            "Banner URL": projectData.bannerUrl || "",
            "Created At": projectData.createdAt || new Date().toISOString(),
            "Updated At": new Date().toISOString(),
            "Custom Fields": JSON.stringify(projectData.customFields || {}),
            "Subtasks": JSON.stringify(projectData.subtasks || []),
            "Comments": JSON.stringify(projectData.comments || [])
         };
      };

      const parsePayloadFromBackend = (record) => {
         return {
            id: record["ID"] || "",
            name: record["Name"] || "",
            description: record["Description"] || "",
            status: record["Status"] || stages[0]?.id || "",
            deadline: record["Deadline"] || "",
            color: record["Color"] || "#1e293b",
            tags: safeJSONParse(record["Tags"], []),
            contactId: record["Contact ID"] || "",
            organizationId: record["Org ID"] || "",
            quoteId: record["Quote ID"] || "",
            invoiceId: record["Invoice ID"] || "",
            receiptId: record["Receipt ID"] || "",
            bannerUrl: record["Banner URL"] || "",
            createdAt: record["Created At"] || new Date().toISOString(),
            updatedAt: record["Updated At"] || new Date().toISOString(),
            customFields: safeJSONParse(record["Custom Fields"], { priority: 'Medium', estimatedHours: '', clientBudget: '', riskLevel: '1' }),
            subtasks: safeJSONParse(record["Subtasks"], []),
            comments: safeJSONParse(record["Comments"], [])
         };
      };

      const syncToBackend = async (action, payloadData) => {
         const url = localStorage.getItem('gasScriptUrl');
         if (!url) return;
         setIsSyncing(true);
         try {
            await fetch(url, {
                method: 'POST',
                body: JSON.stringify({ action, ...payloadData }),
            });
         } catch(e) {
            console.error("Sync Error:", e);
         } finally {
            setIsSyncing(false);
         }
      };

      const fetchFromBackend = async (action) => {
         const url = localStorage.getItem('gasScriptUrl');
         if (!url) return null;
         try {
            const res = await fetch(`${url}?action=${action}`);
            const data = await res.json();
            return data;
         } catch(e) {
            console.error(`Fetch Error [${action}]:`, e);
            return null;
         }
      };

      // State definitions
      const [past, setPast] = useState([]);
      const [future, setFuture] = useState([]);
      const [projects, setProjects] = useState([]);
      const [viewMode, setViewMode] = useState('kanban'); 
      const [contacts, setContacts] = useState(initialContacts);
      const [organizations, setOrganizations] = useState(initialOrganizations);
      const [quotes, setQuotes] = useState([]);
      const [invoices, setInvoices] = useState([]);
      const [receipts, setReceipts] = useState([]);

      // Initialize App Data
      useEffect(() => {
         const initializeApp = async () => {
             const url = localStorage.getItem('gasScriptUrl');
             if (url) {
                setIsConnected(true);
                setIsSyncing(true);
                // Execute parallel fetch to pull Master Tables
                const [orgRes, conRes, projRes, quoteRes, invRes, recRes] = await Promise.all([
                    fetchFromBackend('getOrganizaciones'),
                    fetchFromBackend('getContactos'),
                    fetchFromBackend('getKanbanTasks'),
                    fetchFromBackend('getQuotes'),     // Future master script actions
                    fetchFromBackend('getInvoices'),   // Future master script actions
                    fetchFromBackend('getReceipts')    // Future master script actions
                ]);
                
                if (orgRes && orgRes.length > 0) setOrganizations(orgRes);
                if (conRes && conRes.length > 0) setContacts(conRes);
                if (quoteRes && quoteRes.length > 0) setQuotes(quoteRes);
                if (invRes && invRes.length > 0) setInvoices(invRes);
                if (recRes && recRes.length > 0) setReceipts(recRes);
                
                if (projRes && projRes.length > 0) {
                    setProjects(projRes.map(parsePayloadFromBackend));
                } else {
                    setProjects([]); // Clear if real DB is empty
                }
                setIsSyncing(false);
             } else {
                setIsConnected(false);
                setProjects(initialProjects);
             }
         };
         initializeApp();
      }, []);

      const updateProjects = useCallback((newProjectsOrUpdater) => {
         setProjects(current => {
            const nextProjects = typeof newProjectsOrUpdater === 'function' ? newProjectsOrUpdater(current) : newProjectsOrUpdater;
            setPast(p => [...p, current].slice(-50));
            setFuture([]);
            return nextProjects;
         });
      }, []);

      const handleUndo = useCallback(() => {
         if (past.length === 0) return;
         const previous = past[past.length - 1];
         setPast(past.slice(0, past.length - 1));
         setFuture([projects, ...future]);
         setProjects(previous);
      }, [past, future, projects]);

      const handleRedo = useCallback(() => {
         if (future.length === 0) return;
         const next = future[0];
         setFuture(future.slice(1));
         setPast([...past, projects]);
         setProjects(next);
      }, [past, future, projects]);

      const [searchQuery, setSearchQuery] = useState('');
      const searchInputRef = useRef(null);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });

      const requestConfirm = useCallback((message, onConfirm) => {
          setConfirmDialog({ isOpen: true, message, onConfirm });
      }, []);

      const handleBulkDelete = useCallback(() => {
         requestConfirm(lang === 'en' ? `Are you sure you want to delete ${selectedIds.size} selected project(s)?` : `¿Eliminar ${selectedIds.size} proyectos seleccionados?`, () => {
            // Optimistic Local Update
            updateProjects(prev => prev.filter(p => !selectedIds.has(p.id)));
            // Sync to Backend
            selectedIds.forEach(id => {
                syncToBackend('deleteRecord', { sheetName: 'Kanban', id: id });
            });
            setSelectedIds(new Set());
         });
      }, [lang, selectedIds, updateProjects, requestConfirm]);

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [editingProject, setEditingProject] = useState(null);

      const openNewProject = useCallback(() => { setEditingProject(null); setIsModalOpen(true); }, []);
      const openEditProject = useCallback((project) => { setEditingProject(project); setIsModalOpen(true); }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
          if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchInputRef.current?.focus(); }
          if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); handleUndo(); }
          if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); handleRedo(); }
          if (e.key.toLowerCase() === 'n') { e.preventDefault(); openNewProject(); }
          if (e.key.toLowerCase() === 'e' && selectedIds.size === 1) {
             e.preventDefault();
             const p = projects.find(x => x.id === Array.from(selectedIds)[0]);
             if (p) openEditProject(p);
          }
          if (e.key === 'Delete' || e.key === 'Backspace') {
             if (selectedIds.size > 0) { e.preventDefault(); handleBulkDelete(); }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [handleUndo, handleRedo, selectedIds, projects, handleBulkDelete, openNewProject, openEditProject]);
      
      const [showConfetti, setShowConfetti] = useState(false);
      const [toasts, setToasts] = useState([]);

      const addToast = useCallback((message, title = 'Notification', type = 'info') => {
        const id = Date.now().toString() + Math.random().toString();
        setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => removeToast(id), 5000);
      }, []);
      
      const removeToast = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);

      useEffect(() => {
        const now = new Date();
        let delay = 1000; 
        
        projects.forEach(p => {
          const stageDetails = stages.find(s => s.id === p.status) || {};
          const isFinished = stageDetails.isDone || stageDetails.en === 'Completed' || stageDetails.en === 'Cancelled';
          if (isFinished) return;

          if (p.updatedAt) {
            const daysUntouched = (now - new Date(p.updatedAt)) / (1000 * 60 * 60 * 24);
            if (daysUntouched >= 7) {
              setTimeout(() => addToast(`${p.name} hasn't been updated in 7 days.`, 'Needs Attention', 'warning'), delay);
              delay += 800;
            }
          }

          if (p.deadline) {
            const daysLeft = (new Date(p.deadline) - now) / (1000 * 60 * 60 * 24);
            if (daysLeft > 0 && daysLeft <= 1) {
               setTimeout(() => addToast(`${p.name} is due within 24 hours!`, 'Urgent Deadline', 'alert'), delay);
               delay += 800;
            } else if (daysLeft > 1 && daysLeft <= 2) {
               setTimeout(() => addToast(`${p.name} is due within 48 hours.`, 'Approaching Deadline', 'warning'), delay);
               delay += 800;
            }
          }
        });
      }, []);

      const [dragOverStage, setDragOverStage] = useState(null);
      const scrollContainerRef = useRef(null);
      const [isPanning, setIsPanning] = useState(false);
      const [startX, setStartX] = useState(0);
      const [scrollLeft, setScrollLeft] = useState(0);

      const [visibleLimits, setVisibleLimits] = useState(() => {
        const limits = {};
        stages.forEach(s => limits[s.id] = 10);
        return limits;
      });
      const handleExpand = (stageId) => setVisibleLimits(prev => ({ ...prev, [stageId]: (prev[stageId] || 10) + 10 }));

      const onPanStart = (e) => {
        if (e.target.closest('[draggable]') || e.target.closest('button')) return;
        setIsPanning(true);
        setStartX(e.pageX - scrollContainerRef.current.offsetLeft);
        setScrollLeft(scrollContainerRef.current.scrollLeft);
      };
      const onPanLeaveOrUp = () => setIsPanning(false);
      const onPanMove = (e) => {
        if (!isPanning) return;
        e.preventDefault();
        const walk = (e.pageX - scrollContainerRef.current.offsetLeft - startX) * 1.5;
        scrollContainerRef.current.scrollLeft = scrollLeft - walk;
      };

      const metrics = useMemo(() => {
        const total = projects.length;
        const s0 = projects.filter(p => p.status === stages[0]?.id).length;
        const s1 = projects.filter(p => p.status === stages[1]?.id).length;
        const s2 = projects.filter(p => p.status === stages[2]?.id).length;
        return { total, s0, s1, s2 };
      }, [projects, stages]);

      const triggerConfetti = () => {
        setShowConfetti(false);
        setTimeout(() => setShowConfetti(true), 10);
        setTimeout(() => setShowConfetti(false), 3500);
      };

      const handleSaveProject = (projectData) => {
        let finalData = { ...projectData };
        const hasSubtasks = finalData.subtasks && finalData.subtasks.length > 0;
        const allDone = hasSubtasks && finalData.subtasks.every(st => st.completed);
        const doneStage = stages.find(s => s.isDone || s.en === 'Completed') || stages[stages.length - 1];

        if (allDone && finalData.status !== doneStage.id) {
           finalData.status = doneStage.id;
           addToast(lang === 'en' ? `Moved to ${doneStage.en}!` : `Movido a ${doneStage.es}!`, 'Auto-Completed', 'success');
        }

        if (finalData.id) {
          const oldProject = projects.find(p => p.id === finalData.id);
          if (oldProject && oldProject.status !== doneStage.id && finalData.status === doneStage.id) triggerConfetti();
          updateProjects(prev => prev.map(p => p.id === finalData.id ? finalData : p));
        } else {
          if (finalData.status === doneStage.id) triggerConfetti();
          finalData.id = `proj-${Date.now()}`;
          updateProjects(prev => [...prev, finalData]);
          addToast(lang === 'en' ? `Project created successfully.` : `Proyecto creado con éxito.`, t('newProject', lang), 'success');
        }

        // Sync fully formatted payload to backend
        syncToBackend('saveKanbanTask', { payload: formatPayloadForBackend(finalData) });
      };

      const handleDeleteProject = (id) => {
        requestConfirm(lang === 'en' ? 'Are you sure you want to delete this project?' : '¿Seguro que deseas eliminar este proyecto?', () => {
           updateProjects(prev => prev.filter(p => p.id !== id));
           syncToBackend('deleteRecord', { sheetName: 'Kanban', id: id });
        });
      };

      const handleCloneProject = (project) => {
         const newProject = {
            ...project,
            id: `proj-${Date.now()}`,
            name: `${project.name} (Copy)`,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
         };
         updateProjects(prev => [...prev, newProject]);
         syncToBackend('saveKanbanTask', { payload: formatPayloadForBackend(newProject) });
         addToast(lang === 'en' ? `Project cloned successfully.` : `Proyecto clonado con éxito.`, 'Cloned', 'success');
      };

      const handleCardClick = (e, id) => {
        if (e.target.closest('button')) return; 
        if (e.shiftKey || e.metaKey || e.ctrlKey) {
          const newSet = new Set(selectedIds);
          if (newSet.has(id)) newSet.delete(id); else newSet.add(id);
          setSelectedIds(newSet);
        } else {
          if (selectedIds.has(id) && selectedIds.size === 1) setSelectedIds(new Set());
          else setSelectedIds(new Set([id]));
        }
      };

      const handleBulkStatus = (newStatusId) => {
         if (!newStatusId) return;
         const doneStage = stages.find(s => s.isDone || s.en === 'Completed') || stages[stages.length - 1];
         if (newStatusId === doneStage?.id) triggerConfetti();
         
         const updatedNodes = [];
         updateProjects(prev => prev.map(p => {
             if(selectedIds.has(p.id)){
                 const updatedP = { ...p, status: newStatusId, updatedAt: new Date().toISOString() };
                 updatedNodes.push(updatedP);
                 return updatedP;
             }
             return p;
         }));

         // Bulk sync to DB sequentially to prevent overload
         updatedNodes.forEach(p => syncToBackend('saveKanbanTask', { payload: formatPayloadForBackend(p) }));
         setSelectedIds(new Set());
      };

      const handleExportCSV = () => {
         const filtered = projects.filter(p => (p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.tags?.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))));
         const headers = ['ID', 'Name', 'Status', 'Deadline', 'Organization', 'Contact', 'Priority', 'Est. Hours'];
         const rows = filtered.map(p => [
           p.id, `"${p.name}"`, getStageName(p.status), p.deadline || '', 
           organizations.find(o=>o.id===p.organizationId || o.ID===p.organizationId)?.name || organizations.find(o=>o.id===p.organizationId || o.ID===p.organizationId)?.Nombre || '',
           contacts.find(c=>c.id===p.contactId || c.ID===p.contactId)?.name || contacts.find(c=>c.id===p.contactId || c.ID===p.contactId)?.Nombre || '',
           p.customFields?.priority || '', p.customFields?.estimatedHours || ''
         ]);
         const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows.map(e => e.join(','))].join("\n");
         const encodedUri = encodeURI(csvContent);
         const link = document.createElement("a");
         link.setAttribute("href", encodedUri);
         link.setAttribute("download", "projects_export.csv");
         document.body.appendChild(link);
         link.click();
         document.body.removeChild(link);
      };

      const handleDragStart = (e, projectId) => {
        let idsToDrag = [projectId];
        if (selectedIds.has(projectId)) idsToDrag = Array.from(selectedIds);
        e.dataTransfer.setData('projectIds', JSON.stringify(idsToDrag));
        e.target.style.opacity = '0.5';
      };
      const handleDragEnd = (e) => { e.target.style.opacity = '1'; };

      const handleDrop = (e, newStatusId) => {
        e.preventDefault();
        setDragOverStage(null); 
        const draggedIds = JSON.parse(e.dataTransfer.getData('projectIds') || '[]');
        const doneStage = stages.find(s => s.isDone || s.en === 'Completed') || stages[stages.length - 1];

        if (draggedIds.length > 0) {
          if (newStatusId === doneStage?.id) triggerConfetti();
          const updatedNodes = [];
          updateProjects(prev => prev.map(p => {
             if(draggedIds.includes(p.id)){
                 const updatedP = { ...p, status: newStatusId, updatedAt: new Date().toISOString() };
                 updatedNodes.push(updatedP);
                 return updatedP;
             }
             return p;
          }));
          updatedNodes.forEach(p => syncToBackend('saveKanbanTask', { payload: formatPayloadForBackend(p) }));
          setSelectedIds(new Set()); 
        }
      };

      const handleSaveSettings = (newStages) => {
         setStages(newStages);
         localStorage.setItem('appStages', JSON.stringify(newStages));
      };

      const getContactName = (id) => contacts.find(c => c.id === id || c.ID === id)?.name || contacts.find(c => c.id === id || c.ID === id)?.Nombre || 'No Contact';
      const getOrg = (id) => organizations.find(o => o.id === id || o.ID === id);

      const handleDownloadPDF = (e, type, id) => {
         e.stopPropagation(); // Prevents opening the project modal when clicking the tag
         
         let sourceArray = [];
         let title = "";
         if (type === 'quote') { sourceArray = quotes; title = 'Quote'; }
         else if (type === 'invoice') { sourceArray = invoices; title = 'Invoice'; }
         else if (type === 'receipt') { sourceArray = receipts; title = 'Receipt'; }

         // Find matching document regardless of whether backend uses 'id', 'ID', or 'Invoice No.'
         const doc = sourceArray.find(item => item.id === id || item.ID === id || item['Invoice No.'] === id);
         const docData = doc || { id: id, note: "Document details not available locally." };

         try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            
            pdf.setFontSize(18);
            pdf.text(`${title} Details`, 20, 20);
            
            pdf.setFontSize(12);
            let y = 35;
            
            for (const [key, value] of Object.entries(docData)) {
               // Skip internal IDs and blanks for cleaner presentation
               if (value === '' || value === null || key === 'id' || key === 'ID') continue;
               
               const textLine = `${key}: ${value}`;
               const splitText = pdf.splitTextToSize(textLine, 170); // Auto-wrap long lines
               pdf.text(splitText, 20, y);
               y += (splitText.length * 7) + 3;
               
               if (y > 280) { // Simple pagination fallback
                  pdf.addPage();
                  y = 20;
               }
            }
            
            pdf.save(`${title}_${id}.pdf`);
            addToast(`${title} PDF generated successfully.`, 'Download Started', 'success');
         } catch (error) {
            console.error("PDF Generation Error:", error);
            addToast('Failed to generate PDF. Ensure internet connection to load jsPDF.', 'Error', 'alert');
         }
      };

      return (
        <div className="min-h-screen flex flex-col">
          {showConfetti && <Confetti />}
          <ToastContainer toasts={toasts} removeToast={removeToast} />

          {confirmDialog.isOpen && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
              <div className="bg-white p-6 rounded-xl shadow-xl max-w-sm w-full relative animate-[slideInRight_0.2s_ease-out]">
                <div className="flex items-center gap-3 mb-3">
                  <div className="p-2 bg-rose-100 text-rose-600 rounded-full">
                    <IcoAlertTriangle className="w-6 h-6" />
                  </div>
                  <h3 className="text-lg font-bold text-slate-800">Confirm Action</h3>
                </div>
                <p className="text-sm text-slate-600 mb-6 pl-1">{confirmDialog.message}</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setConfirmDialog({ isOpen: false, message: '', onConfirm: null })} className="px-4 py-2 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200 transition-colors">Cancel</button>
                  <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog({ isOpen: false, message: '', onConfirm: null }); }} className="px-4 py-2 bg-rose-500 text-white font-medium rounded-lg hover:bg-rose-600 transition-colors shadow-sm active:scale-95">Confirm</button>
                </div>
              </div>
            </div>
          )}

          {selectedIds.size > 0 && (
             <div className="bulk-bar-enter fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-primary text-white px-5 py-3 rounded-2xl shadow-2xl z-50 flex items-center gap-4 border border-white/10">
                <span className="font-semibold whitespace-nowrap text-sm">{selectedIds.size} {t('selected', lang)}</span>
                <div className="w-px h-5 bg-white/20"></div>
                <select onChange={(e) => handleBulkStatus(e.target.value)} value="" className="bg-white/10 border border-white/20 rounded-lg px-2 py-1 text-sm outline-none cursor-pointer focus:ring-2 focus:ring-white/40 appearance-none">
                   <option value="" disabled className="text-gray-800">{t('changeStatus', lang)}</option>
                   {stages.map(s => <option key={s.id} value={s.id} className="text-gray-800">{s[lang]}</option>)}
                </select>
                <div className="w-px h-5 bg-white/20"></div>
                <button onClick={handleBulkDelete} className="hover:text-rose-300 transition-colors p-1" title="Delete Selected (Del)"><IcoTrash2 className="w-4 h-4" /></button>
                <button onClick={() => setSelectedIds(new Set())} className="hover:text-gray-300 transition-colors p-1" title="Clear Selection"><IcoX className="w-4 h-4" /></button>
             </div>
          )}
          
          <header className="bg-primary border-b border-primary/80 sticky top-0 z-30 shadow-md">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
              <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex items-center gap-3 w-full md:w-auto">
                  <img src="https://bucket.mlcdn.com/a/3336/3336910/images/b36992e2d416de4cf5df1be4ec85e5184f8481dc.png" alt="Logo" className="h-10 w-auto object-contain" />
                  {isConnected && (
                    <div className="flex items-center gap-1.5 px-2.5 py-1 bg-white/10 rounded-full border border-white/20 ml-2">
                       <div className={`w-2 h-2 rounded-full ${isSyncing ? 'bg-amber-400 animate-pulse' : 'bg-emerald-400'}`}></div>
                       <span className="text-[10px] text-white font-medium uppercase tracking-wider">{isSyncing ? 'Syncing...' : 'Connected'}</span>
                    </div>
                  )}
                </div>
                
                <div className="flex justify-center items-center gap-2 w-full md:w-auto flex-wrap">
                  <div className="relative group mr-1 md:mr-2 w-full sm:w-auto mb-2 sm:mb-0">
                    <IcoSearch className="w-4 h-4 text-white/60 absolute left-3 top-1/2 transform -translate-y-1/2" />
                    <input 
                      ref={searchInputRef} type="text" placeholder={t('searchPlaceholder', lang)} 
                      value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                      className="bg-white/10 border border-white/20 text-white placeholder-white/50 pl-9 pr-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/40 focus:bg-white/20 w-full sm:w-48 sm:focus:w-64 transition-all"
                    />
                  </div>

                  <div className="flex items-center bg-white/10 border border-white/20 rounded-lg p-0.5 mr-1 md:mr-2">
                    <button onClick={handleExportCSV} className="p-2.5 rounded-md transition-colors text-white hover:bg-white/20" title={t('exportCSV', lang)}><IcoDownload className="w-4 h-4" /></button>
                    <button onClick={handleUndo} disabled={past.length === 0} className={`p-2.5 rounded-md transition-colors ${past.length > 0 ? 'text-white hover:bg-white/20' : 'text-white/30 cursor-not-allowed'}`} title="Undo (Cmd+Z)"><IcoUndo className="w-4 h-4" /></button>
                    <button onClick={handleRedo} disabled={future.length === 0} className={`p-2.5 rounded-md transition-colors ${future.length > 0 ? 'text-white hover:bg-white/20' : 'text-white/30 cursor-not-allowed'}`} title="Redo (Cmd+Y)"><IcoRedo className="w-4 h-4" /></button>
                  </div>

                  <div className="flex items-center bg-white/10 border border-white/20 rounded-lg p-0.5 mr-1 md:mr-2">
                    <button onClick={() => setViewMode('kanban')} className={`p-2.5 rounded-md transition-colors ${viewMode === 'kanban' ? 'bg-white/20 text-white shadow-sm' : 'text-white/60 hover:text-white'}`} title={t('kanbanView', lang)}><IcoLayoutDashboard className="w-4 h-4" /></button>
                    <button onClick={() => setViewMode('list')} className={`p-2.5 rounded-md transition-colors ${viewMode === 'list' ? 'bg-white/20 text-white shadow-sm' : 'text-white/60 hover:text-white'}`} title={t('listView', lang)}><IcoList className="w-4 h-4" /></button>
                    <button onClick={() => setViewMode('gallery')} className={`p-2.5 rounded-md transition-colors ${viewMode === 'gallery' ? 'bg-white/20 text-white shadow-sm' : 'text-white/60 hover:text-white'}`} title={t('galleryView', lang)}><IcoGrid className="w-4 h-4" /></button>
                  </div>

                  <button onClick={toggleLanguage} className="flex items-center justify-center p-2.5 text-white bg-white/10 border border-white/20 hover:bg-white/20 rounded-lg shadow-sm transition-colors" title={lang === 'en' ? 'Switch to Spanish' : 'Cambiar a Inglés'}>
                    <IcoGlobe className="w-5 h-5" />
                    <span className="ml-1 text-xs font-bold w-4 text-center">{lang.toUpperCase()}</span>
                  </button>

                  <button onClick={() => setIsSettingsOpen(true)} className="flex items-center justify-center p-2.5 text-white bg-white/10 border border-white/20 hover:bg-white/20 rounded-lg shadow-sm transition-colors" title={t('settings', lang)}>
                    <IcoSettings className="w-5 h-5" />
                  </button>
                  <button onClick={openNewProject} className="hidden lg:flex items-center gap-2 bg-white hover:bg-gray-50 text-primary px-4 sm:px-5 py-2.5 rounded-lg font-medium shadow-sm transition-all active:scale-95">
                    <IcoPlus className="w-5 h-5" />
                    <span className="hidden sm:inline">{t('newProject', lang)}</span>
                  </button>
                </div>
              </div>

              <div className="mt-8 text-center md:text-left">
                <p className="text-white/80 mb-4 text-sm font-medium">{t('manageDesc', lang)}</p>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-left">
                  <MetricCard title={t('totalProjects', lang)} value={metrics.total} color="bg-white text-primary border-slate-300 shadow-sm" icon={IcoFolders} iconColor="text-metric-icon" />
                  {stages[0] && <MetricCard title={stages[0][lang]} value={metrics.s0} color="bg-white text-primary border-slate-300 shadow-sm" icon={IcoZap} iconColor="text-metric-icon" />}
                  {stages[1] && <MetricCard title={stages[1][lang]} value={metrics.s1} color="bg-white text-primary border-slate-300 shadow-sm" icon={IcoClock} iconColor="text-metric-icon" />}
                  {stages[2] && <MetricCard title={stages[2][lang]} value={metrics.s2} color="bg-white text-primary border-slate-300 shadow-sm" icon={IcoCheckSquare} iconColor="text-metric-icon" />}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full flex flex-col">
            
            {/* Kanban View */}
            {viewMode === 'kanban' && (
              <div 
                ref={scrollContainerRef} onMouseDown={onPanStart} onMouseLeave={onPanLeaveOrUp} onMouseUp={onPanLeaveOrUp} onMouseMove={onPanMove}
                className={`flex-1 flex items-stretch gap-6 overflow-x-auto pb-8 min-h-[calc(100vh-300px)] snap-x snap-mandatory scroll-smooth ${isPanning ? 'cursor-grabbing select-none' : 'cursor-grab'}`}
              >
                {stages.map(stage => {
                  const stageProjects = projects.filter(p => p.status === stage.id && (p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.tags?.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))));
                  const visibleProjects = stageProjects.slice(0, visibleLimits[stage.id] || 10);
                  const hasMore = stageProjects.length > (visibleLimits[stage.id] || 10);
                  const isDragOver = dragOverStage === stage.id;

                  return (
                  <div 
                    key={stage.id}
                    className={`flex-shrink-0 w-80 rounded-xl border border-slate-200 flex flex-col transition-colors duration-200 snap-center ${isDragOver ? 'bg-gray-200' : 'bg-slate-100/80'}`}
                    onDragOver={(e) => { e.preventDefault(); setDragOverStage(stage.id); }}
                    onDragLeave={() => setDragOverStage(null)}
                    onDrop={(e) => handleDrop(e, stage.id)}
                  >
                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-100/50 rounded-t-xl shrink-0 pointer-events-none sticky top-0 z-10 backdrop-blur-sm">
                      <h3 className="font-semibold text-title flex items-center gap-2">
                        {stage[lang]}
                        <span className="bg-card border border-slate-200 text-xs py-0.5 px-2 rounded-full text-text font-medium shadow-sm">
                          {stageProjects.length}
                        </span>
                      </h3>
                    </div>
                    
                    <div className="p-3 flex-1 space-y-3">
                      {visibleProjects.map(project => {
                        const org = getOrg(project.organizationId);
                        const subtaskTotal = project.subtasks?.length || 0;
                        const subtasksDone = project.subtasks?.filter(st => st.completed).length || 0;
                        
                        const daysUntouched = project.updatedAt ? Math.floor((new Date() - new Date(project.updatedAt)) / (1000 * 60 * 60 * 24)) : 0;
                        const isFinished = stage.isDone || stage.en === 'Completed' || stage.en === 'Cancelled';
                        const isAgingWarning = !isFinished && daysUntouched >= 4 && daysUntouched < 7;
                        const isAgingCritical = !isFinished && daysUntouched >= 7;
                        
                        const isSelected = selectedIds.has(project.id);
                        const borderClass = isSelected 
                          ? 'border-primary ring-2 ring-primary ring-offset-2' 
                          : isAgingCritical 
                          ? 'border-rose-400 ring-2 ring-rose-400/50 shadow-rose-100' 
                          : isAgingWarning 
                          ? 'border-amber-400 ring-2 ring-amber-400/50 shadow-amber-100' 
                          : 'border-slate-200';

                        let deadlineColorClass = 'text-gray-600 bg-gray-50 border-gray-100';
                        if (project.deadline && !isFinished) {
                          const daysLeft = (new Date(project.deadline) - new Date()) / (1000 * 60 * 60 * 24);
                          if (daysLeft < 0) deadlineColorClass = 'text-rose-700 bg-rose-50 border-rose-200';
                          else if (daysLeft <= 3) deadlineColorClass = 'text-amber-700 bg-amber-50 border-amber-200';
                          else deadlineColorClass = 'text-emerald-700 bg-emerald-50 border-emerald-200';
                        }

                        return (
                          <div
                            key={project.id} draggable
                            onDragStart={(e) => handleDragStart(e, project.id)}
                            onDragEnd={handleDragEnd}
                            onClick={(e) => handleCardClick(e, project.id)}
                            className={`bg-card rounded-lg shadow-sm hover:shadow-md border ${borderClass} overflow-hidden cursor-pointer transition-all group relative shrink-0`}
                          >
                            {(isAgingWarning || isAgingCritical) && (
                              <div className={`absolute top-2 right-2 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm flex items-center gap-1 z-30 ${isAgingCritical ? 'bg-rose-100 text-rose-700 border-rose-200' : 'bg-amber-100 text-amber-700 border-amber-200'} border`}>
                                <IcoAlertTriangle className="w-3 h-3" />
                                {daysUntouched}d in stage
                              </div>
                            )}

                            <div className="absolute left-0 top-0 bottom-0 w-1.5 z-20" style={{ backgroundColor: project.color }}></div>
                            
                            <div className="h-24 w-full bg-gray-100 overflow-hidden relative">
                              <img 
                                src={project.bannerUrl || getDefaultBanner(project.id)} 
                                alt="Project Banner" className="w-full h-full object-cover object-center pointer-events-none"
                                onError={(e) => e.target.style.display = 'none'}
                              />
                            </div>
                            
                            <div className="p-4 pl-5 relative">
                              {(org?.logo || org?.Logo) && (
                                <div className="absolute -top-7 left-5 w-12 h-12 rounded-full border-[3px] border-card shadow-sm overflow-hidden bg-card z-10 flex items-center justify-center">
                                   <img src={org.logo || org.Logo} alt={org.name || org.Nombre} className="w-full h-full object-cover" />
                                </div>
                              )}

                              <div className="flex justify-between items-start gap-2">
                                <h4 className={`font-semibold text-title leading-tight mb-2 group-hover:text-primary transition-colors ${(org?.logo || org?.Logo) ? 'pt-5' : ''}`}>
                                  {project.name}
                                </h4>
                                <div className={`flex opacity-0 group-hover:opacity-100 transition-opacity ${(org?.logo || org?.Logo) ? 'pt-5' : ''}`}>
                                  <button onClick={(e) => { e.stopPropagation(); handleCloneProject(project); }} className="p-1 text-gray-400 hover:text-primary rounded" title="Clone Project"><IcoCopy className="w-4 h-4" /></button>
                                  <button onClick={(e) => { e.stopPropagation(); openEditProject(project); }} className="p-1 text-gray-400 hover:text-primary rounded" title="Edit"><IcoEdit3 className="w-4 h-4" /></button>
                                  <button onClick={(e) => { e.stopPropagation(); handleDeleteProject(project.id); }} className="p-1 text-gray-400 hover:text-red-600 rounded" title="Delete"><IcoTrash2 className="w-4 h-4" /></button>
                                </div>
                              </div>

                              {org && (
                                <div className="flex items-center gap-1.5 text-xs text-text mb-1 truncate">
                                  <IcoBuilding2 className="w-3.5 h-3.5 flex-shrink-0" />
                                  <span className="truncate">{org.name || org.Nombre}</span>
                                </div>
                              )}
                              
                              {project.contactId && (
                                <div className="flex items-center gap-1.5 text-xs text-text mb-3 truncate">
                                  <IcoUserCircle className="w-3.5 h-3.5 flex-shrink-0" />
                                  <span className="truncate">{getContactName(project.contactId)}</span>
                                </div>
                              )}

                              {project.customFields && (
                                <div className="grid grid-cols-2 gap-2 mb-3 pt-2 border-t border-gray-100">
                                  <div className="flex items-center gap-1.5 text-[10px] text-gray-500">
                                    <IcoZap className={`w-3 h-3 flex-shrink-0 ${project.customFields.priority === 'High' ? 'text-rose-500' : project.customFields.priority === 'Medium' ? 'text-amber-500' : 'text-emerald-500'}`} />
                                    <span className="truncate font-medium text-gray-700">{project.customFields.priority} Priority</span>
                                  </div>
                                  {project.customFields.estimatedHours && (
                                    <div className="flex items-center gap-1.5 text-[10px] text-gray-500">
                                      <IcoClock className="w-3 h-3 flex-shrink-0 text-primary" />
                                      <span className="truncate font-medium text-gray-700">{project.customFields.estimatedHours}h Est.</span>
                                    </div>
                                  )}
                                </div>
                              )}

                              {subtaskTotal > 0 && (
                                <div className="mb-3">
                                  <div className="flex items-center justify-between text-[10px] text-gray-500 mb-1 font-medium">
                                    <span>{t('subtasks', lang)}</span>
                                    <span>{subtasksDone}/{subtaskTotal}</span>
                                  </div>
                                  <div className="w-full bg-gray-100 rounded-full h-1.5">
                                    <div className="bg-primary h-1.5 rounded-full transition-all" style={{ width: `${(subtasksDone/subtaskTotal)*100}%` }}></div>
                                  </div>
                                </div>
                              )}

                              {(project.quoteId || project.invoiceId || project.receiptId || project.comments?.length > 0) && (
                                <div className="flex flex-wrap gap-2 mb-3">
                                  {project.quoteId && (
                                    <button onClick={(e) => handleDownloadPDF(e, 'quote', project.quoteId)} title="Download Quote PDF" className="flex items-center gap-1 text-[10px] bg-primary/10 text-primary px-2 py-0.5 rounded border border-primary/20 font-medium shadow-sm hover:bg-primary/20 transition-colors">
                                      <IcoFileText className="w-3 h-3" /> Quote {quotes.find(q => q.id === project.quoteId || q.ID === project.quoteId || q['Invoice No.'] === project.quoteId)?.['Invoice No.'] || ''}
                                    </button>
                                  )}
                                  {project.invoiceId && (
                                    <button onClick={(e) => handleDownloadPDF(e, 'invoice', project.invoiceId)} title="Download Invoice PDF" className="flex items-center gap-1 text-[10px] bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded border border-emerald-200 font-medium shadow-sm hover:bg-emerald-100 transition-colors">
                                      <IcoReceipt className="w-3 h-3" /> Invoice {invoices.find(i => i.id === project.invoiceId || i.ID === project.invoiceId || i['Invoice No.'] === project.invoiceId)?.['Invoice No.'] || ''}
                                    </button>
                                  )}
                                  {project.receiptId && (
                                    <button onClick={(e) => handleDownloadPDF(e, 'receipt', project.receiptId)} title="Download Receipt PDF" className="flex items-center gap-1 text-[10px] bg-purple-50 text-purple-700 px-2 py-0.5 rounded border border-purple-200 font-medium shadow-sm hover:bg-purple-100 transition-colors">

                                    </button>
                                  )}
                                  {project.comments?.length > 0 && <span title="Comments" className="flex items-center gap-1 text-[10px] bg-secondary/10 text-secondary px-2 py-0.5 rounded border border-secondary/20 font-medium shadow-sm"><IcoMessageSquare className="w-3 h-3" /> {project.comments.length}</span>}
                                </div>
                              )}

                              {project.deadline && (
                                <div className={`flex items-center gap-1.5 text-xs font-medium inline-flex px-2 py-1 rounded-md mb-3 border ${deadlineColorClass}`}>
                                  <IcoCalendar className="w-3.5 h-3.5" />

                                      <IcoTag className="w-2.5 h-2.5" />

                              )}
                            </div>
                          </div>

                      {stageProjects.length === 0 && (

                          <p className="text-sm text-gray-400 font-medium text-center">{t('dragHere', lang)}</p>

                      {hasMore && (

                    </div>
                  </div>

            {/* List View */}
            {viewMode === 'list' && (() => {
               const filteredProjects = projects.filter(p => (p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.tags?.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))));
               
               return (

                               </th>
                               <th className="p-4">{t('thName', lang)}</th>
                               <th className="p-4">{t('thStatus', lang)}</th>
                               <th className="p-4">{t('thDeadline', lang)}</th>
                               <th className="p-4">{t('thPriority', lang)}</th>
                               <th className="p-4">{t('thClient', lang)}</th>
                            </tr>
                         </thead>
                         <tbody className="divide-y divide-slate-100">
                            {filteredProjects.map(project => (
                               <tr key={project.id} onClick={(e) => handleCardClick(e, project.id)} className={`hover:bg-slate-50 cursor-pointer transition-colors group ${selectedIds.has(project.id) ? 'bg-primary/5' : ''}`}>
                                  <td className="p-4 text-center">
                                     <input type="checkbox" checked={selectedIds.has(project.id)} readOnly className="rounded border-gray-300 text-primary focus:ring-primary cursor-pointer pointer-events-none" />
                                  </td>
                                  <td className="p-4">
                                     <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded bg-gray-100 overflow-hidden flex-shrink-0">
                                           <img src={project.bannerUrl || getDefaultBanner(project.id)} className="w-full h-full object-cover" onError={(e) => e.target.style.display='none'} />
                                        </div>
                                        <span className="font-medium text-title">{project.name}</span>
                                     </div>
                                  </td>
                                  <td className="p-4">
                                     <span className="bg-gray-100 px-2 py-1 rounded text-xs text-gray-600 font-medium">{getStageName(project.status)}</span>
                                  </td>
                                  <td className="p-4 text-sm text-gray-500">
                                     {project.deadline ? new Date(project.deadline).toLocaleDateString() : '-'}
                                  </td>
                                  <td className="p-4">
                                     <span className={`text-xs font-medium px-2 py-1 rounded-full ${project.customFields?.priority === 'High' ? 'bg-rose-100 text-rose-700' : project.customFields?.priority === 'Medium' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                        {project.customFields?.priority || 'Normal'}
                                     </span>
                                  </td>
                                  <td className="p-4 text-sm text-gray-500">
                                     {getOrg(project.organizationId)?.name || getOrg(project.organizationId)?.Nombre || '-'}
                                  </td>
                               </tr>
                            ))}
                            {filteredProjects.length === 0 && (
                               <tr>
                                  <td colSpan="6" className="p-8 text-center text-gray-500">{t('noProjects', lang)}</td>
                               </tr>
                            )}
                         </tbody>
                       </table>
                    </div>
                 </div>
               );
            })()}

            {/* Gallery View */}
            {viewMode === 'gallery' && (() => {
               const filteredProjects = projects.filter(p => (p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.tags?.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))));
               
               return (
                 <div className="flex flex-col gap-8 w-full">
                   {stages.map(stage => {
                      const stageProjects = filteredProjects.filter(p => p.status === stage.id);
                      if (stageProjects.length === 0) return null;
                      
                      return (
                        <div key={stage.id}>
                           <h3 className="text-lg font-bold text-title mb-4 border-b border-gray-200 pb-2">{stage[lang]} <span className="text-sm font-normal text-text ml-2">({stageProjects.length})</span></h3>
                           <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                              {stageProjects.map(project => (
                                 <div 
                                    key={project.id} 
                                    onClick={(e) => handleCardClick(e, project.id)} 
                                    className={`relative aspect-[4/3] rounded-xl overflow-hidden cursor-pointer group transition-all bg-gray-100 ${selectedIds.has(project.id) ? 'ring-4 ring-primary ring-offset-2' : 'hover:shadow-lg'}`}
                                 >
                                    <img src={project.bannerUrl || getDefaultBanner(project.id)} alt={project.name} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onError={(e) => e.target.style.display='none'} />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-80 group-hover:opacity-100 transition-opacity"></div>
                                    
                                    <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                       <button onClick={(e) => { e.stopPropagation(); openEditProject(project); }} className="p-1.5 bg-white/20 hover:bg-white/40 backdrop-blur-md rounded text-white" title="Edit"><IcoEdit3 className="w-3.5 h-3.5" /></button>
                                    </div>

                                    <div className="absolute bottom-3 left-3 right-3 z-10 flex flex-col">
                                       <span className="text-white font-semibold text-sm truncate drop-shadow-md">{project.name}</span>
                                    </div>

                                    {selectedIds.has(project.id) && (
                                       <div className="absolute top-2 left-2 bg-primary text-white rounded-full p-0.5 shadow-md z-10">
                                          <IcoCheck className="w-3.5 h-3.5" />
                                       </div>
                                    )}
                                 </div>
                              ))}
                           </div>
                        </div>
                      )
                   })}
                   {filteredProjects.length === 0 && (
                      <div className="text-center text-gray-500 py-12">{t('noProjects', lang)}</div>
                   )}
                 </div>
               );
            })()}

          </main>

          <footer className="w-full py-6 text-center text-sm text-white/80 border-t border-primary/90 bg-primary">
            Desarrollado con 💖 por <a href="https://bebelldigitalsolutions.com" target="_blank" rel="noopener noreferrer" className="text-white font-semibold hover:text-white/80 hover:underline transition-colors">Bebell</a> Digital Solutions
          </footer>

          <button onClick={openNewProject} className="fixed bottom-6 right-6 z-[90] flex items-center justify-center w-14 h-14 bg-primary text-white rounded-full shadow-lg shadow-primary/40 hover:scale-105 active:scale-95 transition-all">
            <IcoPlus className="w-6 h-6" />
          </button>

          <ProjectModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSave={handleSaveProject} initialData={editingProject} contacts={contacts} organizations={organizations} quotes={quotes} invoices={invoices} receipts={receipts} addToast={addToast} lang={lang} stages={stages} />
          <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} addToast={addToast} lang={lang} initialStages={stages} onSaveSettings={handleSaveSettings} requestConfirm={requestConfirm} />
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
